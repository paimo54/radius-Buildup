# ================================================================
# VPS SELF CLIENT — injected by install script using ${VPS_IP}
# Allows local radtest and app health-check to reach FreeRADIUS
# via the LAN IP (not just 127.0.0.1).
# ================================================================
# client vps_self {
#     ipaddr = <VPS_LAN_IP>        # e.g. 192.168.99.212
#     secret = testing123
#     shortname = vps-self
#     nas_type = other
#     require_message_authenticator = no
#     limit_proxy_state = no
# }

# ================================================================
# PROXMOX LXC NAT NOTE
# If this VPS is an LXC container behind Proxmox and the MikroTik
# NAS is on a different network segment (not bridged), the Proxmox
# host will NAT/masquerade all RADIUS UDP packets — FreeRADIUS sees
# the Proxmox bridge IP as the source, NOT the real NAS IP.
#
# Fix: add the Proxmox bridge gateway IP as a client here, with the
# same secret as the NAS:
#
# client proxmox_gateway {
#     ipaddr = 192.168.99.1        # Proxmox bridge/gateway IP
#     secret = <same-as-NAS>
#     shortname = proxmox-gw
#     nas_type = other
#     require_message_authenticator = no
#     limit_proxy_state = no
# }
#
# Alternatively, add an iptables/nftables NOTRACK rule on the Proxmox
# host to bypass NAT for UDP 1812-1813 destined for this LXC IP.
# ================================================================

# Auto-generated NAS clients from database (managed by salfanet-radius app)
# DO NOT add NAS entries here - they are managed via clients.d/nas-from-db.conf
$INCLUDE clients.d/
