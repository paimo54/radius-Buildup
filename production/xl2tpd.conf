[global]
port = 1701
access control = no

[lac vpn-server]
lns = 103.146.202.131
ppp debug = yes
pppoptfile = /etc/ppp/options.l2tpd.client
length bit = yes
; Auto-dial on xl2tpd start — no manual 'c vpn-server' needed
autodial = yes
; Auto-redial when connection drops — xl2tpd handles reconnect natively
redial = yes
; Wait 15 seconds before redialing (prevents tight reconnect loops)
redial timeout = 15
